# Auto-add deploy.yml + set Public for every izemx-mvp repo (Lovable connect = done).
#
# ONE-TIME: Org secret MVP_GH_PAT (Contents+Workflows+Administration write, all repos, secret access = ALL)
#
# Manual trigger only — GitHub's cron scheduler proved unreliable for this repo
# (zero scheduled runs). Run from the Actions tab, or wire an external trigger
# (org webhook relay / k8s CronJob) to workflow_dispatch.

name: Bootstrap MVP deploy

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to fix (optional, empty = scan all)"
        required: false
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout templates
        uses: actions/checkout@v4

      - name: Bootstrap MVP repos (pipeline + public)
        uses: actions/github-script@v7
        env:
          MVP_GH_PAT: ${{ secrets.MVP_GH_PAT }}
          DEPLOY_YAML: ${{ github.workspace }}/mvp-template/deploy-caller.yml
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REPO: ${{ inputs.repo }}
        with:
          github-token: ${{ secrets.MVP_GH_PAT }}
          script: |
            const fs = require('fs');
            const owner = 'izemx-mvp';
            const path = '.github/workflows/deploy.yml';
            const deployYaml = fs.readFileSync(process.env.DEPLOY_YAML, 'utf8');

            if (!process.env.MVP_GH_PAT) {
              core.setFailed('MVP_GH_PAT org secret missing');
              return;
            }

            let repos = [];
            if (process.env.EVENT_NAME === 'workflow_dispatch' && process.env.INPUT_REPO) {
              repos = [process.env.INPUT_REPO];
            } else {
              const all = await github.paginate(github.rest.repos.listForOrg, { org: owner, per_page: 100 });
              repos = all.map((r) => r.name).filter((n) => n !== '.github');
              core.info(`Scanning ${repos.length} repos`);
            }

            async function bootstrapRepo(repo) {
              if (repo === '.github') return;

              const { data: meta } = await github.rest.repos.get({ owner, repo });
              let branch = meta.default_branch || 'main';

              let deployExists = false;
              try {
                const { data: existing } = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(existing)) deployExists = true;
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              if (!deployExists) {
                const content = Buffer.from(deployYaml).toString('base64');
                const message = 'chore: bootstrap MVP deploy workflow';
                try {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo, branch, path, message, content,
                  });
                  core.info(`Added deploy.yml to ${repo} on ${branch}`);
                } catch (e) {
                  if (e.status === 404 && branch === 'main') {
                    await github.rest.repos.createOrUpdateFileContents({
                      owner, repo, branch: 'develop', path, message, content,
                    });
                    core.info(`Added deploy.yml to ${repo} on develop`);
                  } else {
                    throw e;
                  }
                }
              }

              if (meta.private) {
                try {
                  await github.rest.repos.update({ owner, repo, private: false });
                  core.info(`Set ${repo} to public`);
                } catch (e) {
                  core.warning(`${repo}: could not set public — PAT needs Administration write`);
                }
              }
            }

            for (const repo of repos) {
              try {
                await bootstrapRepo(repo);
              } catch (e) {
                core.warning(`${repo}: ${e.message}`);
              }
            }
