# Reusable GitHub Actions pipeline for Izemx MVPs (replaces GitLab CI).
# Build assets live in the SAME repo under mvp-template/
#
# Org SECRETS: DOCKERHUB_USERNAME, DOCKER_PASSWORD, KUBECONFIG, HOSTINGER_API_TOKEN, DISCORD_WEBHOOK_URL
# Per-repo SECRETS (optional, fullstack + DB only): DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD,
#   LOVABLE_API_KEY, RESEND_API_KEY
# Org VARIABLES: DOCKER_NAMESPACE, MVP_SERVER_IP, DOMAIN, CLUSTER_ISSUER
#
# Repo Settings → Actions → General → Access:
#   "Accessible from repositories in the izemx-mvp organization"

name: MVP Deploy

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: docker.io
      SLUG: ${{ github.event.repository.name }}
      DOCKER_NAMESPACE: ${{ vars.DOCKER_NAMESPACE }}
      DOMAIN: ${{ vars.DOMAIN }}
      MVP_SERVER_IP: ${{ vars.MVP_SERVER_IP }}
      CLUSTER_ISSUER: ${{ vars.CLUSTER_ISSUER }}
    steps:
      - name: Checkout app code
        uses: actions/checkout@v4

      - name: Checkout MVP templates
        uses: actions/checkout@v4
        with:
          repository: izemx-mvp/.github
          path: .mvp

      - name: Stage build assets + ensure build:docker script
        run: |
          cp -r .mvp/mvp-template/k8s ./k8s
          if [ -f package.json ]; then
            if find src/routes/api -type f \( -name '*.ts' -o -name '*.tsx' \) 2>/dev/null | grep -q .; then
              echo "Build mode: fullstack (TanStack Start + API routes)"
              echo "BUILD_MODE=fullstack" >> "$GITHUB_ENV"
              cp .mvp/mvp-template/Dockerfile.fullstack ./Dockerfile
              cp .mvp/mvp-template/vite.config.fullstack.ts .
              cp .mvp/mvp-template/.dockerignore .
              node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.scripts=p.scripts||{};p.scripts['build:docker']='vite build --config vite.config.fullstack.ts';fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('set build:docker for fullstack');"
            else
              echo "Build mode: Lovable static SPA (nginx)"
              echo "BUILD_MODE=lovable-static" >> "$GITHUB_ENV"
              cp .mvp/mvp-template/Dockerfile .
              cp .mvp/mvp-template/nginx.conf .
              cp .mvp/mvp-template/vite.config.docker.ts .
              cp .mvp/mvp-template/.dockerignore .
              node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.scripts=p.scripts||{};if(!p.scripts['build:docker']){p.scripts['build:docker']='vite build --config vite.config.docker.ts';fs.writeFileSync('package.json',JSON.stringify(p,null,2));console.log('added build:docker');}"
            fi
          elif [ -f index.html ]; then
            echo "Build mode: static HTML"
            echo "BUILD_MODE=static-html" >> "$GITHUB_ENV"
            cp .mvp/mvp-template/static/Dockerfile .
            cp .mvp/mvp-template/static/nginx.conf .
          else
            echo "ERROR: need package.json (Lovable) or index.html (static site)"; exit 1
          fi

      - name: Docker Hub login
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "ERROR: set org secrets DOCKER_USERNAME and DOCKER_PASSWORD (Docker Hub access token)"
            exit 1
          fi
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and push image
        id: build
        run: |
          IMAGE="${REGISTRY}/${DOCKER_NAMESPACE}/${SLUG}"
          TAG="${GITHUB_SHA::12}"
          docker build -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_CONTENT" > ~/.kube/config
          chmod 600 ~/.kube/config
          CLUSTER=$(kubectl config view -o jsonpath='{.clusters[0].name}')
          kubectl config unset "clusters.${CLUSTER}.certificate-authority-data" || true
          kubectl config set-cluster "${CLUSTER}" \
            --server="https://${MVP_SERVER_IP}:6443" \
            --insecure-skip-tls-verify=true

      - name: Wait for Kubernetes API
        run: |
          for i in $(seq 1 10); do
            if kubectl version --request-timeout=15s >/dev/null 2>&1; then
              echo "✅ Kubernetes API reachable"; exit 0
            fi
            echo "API not reachable yet ($i/10), retrying in 15s..."; sleep 15
          done
          echo "ERROR: Kubernetes API (${MVP_SERVER_IP}:6443) unreachable after retries"; exit 1

      - name: Sync optional env secret (fullstack only)
        if: env.BUILD_MODE == 'fullstack'
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          LOVABLE_API_KEY: ${{ secrets.LOVABLE_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          SECRET_NAME="${SLUG}-env"
          ARGS=()
          [ -n "$DB_HOST" ] && ARGS+=(--from-literal=DB_HOST="$DB_HOST")
          [ -n "$DB_PORT" ] && ARGS+=(--from-literal=DB_PORT="$DB_PORT")
          [ -n "$DB_NAME" ] && ARGS+=(--from-literal=DB_NAME="$DB_NAME")
          [ -n "$DB_USER" ] && ARGS+=(--from-literal=DB_USER="$DB_USER")
          [ -n "$DB_PASSWORD" ] && ARGS+=(--from-literal=DB_PASSWORD="$DB_PASSWORD")
          [ -n "$LOVABLE_API_KEY" ] && ARGS+=(--from-literal=LOVABLE_API_KEY="$LOVABLE_API_KEY")
          [ -n "$RESEND_API_KEY" ] && ARGS+=(--from-literal=RESEND_API_KEY="$RESEND_API_KEY")
          if [ ${#ARGS[@]} -eq 0 ]; then
            echo "No per-repo env secrets configured for ${SLUG} — API runs without DB/email credentials"
            kubectl delete secret "$SECRET_NAME" -n mvp-lab --ignore-not-found
            exit 0
          fi
          kubectl create secret generic "$SECRET_NAME" -n mvp-lab "${ARGS[@]}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Synced ${SECRET_NAME} ($((${#ARGS[@]})) keys)"

      - name: Deploy to Kubernetes
        env:
          IMAGE: ${{ steps.build.outputs.image }}
        run: |
          HOST="${SLUG}.${DOMAIN}"
          echo "Deploying ${IMAGE} -> https://${HOST} (mode: ${BUILD_MODE})"
          if kubectl get deployment "${SLUG}" -n mvp-lab >/dev/null 2>&1; then
            echo "DEPLOY_MODE=updated" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_MODE=created" >> "$GITHUB_ENV"
          fi
          retry() {
            for i in $(seq 1 5); do
              "$@" && return 0
              echo "command failed (attempt $i/5), retrying in 15s..."; sleep 15
            done
            return 1
          }
          mkdir -p rendered
          if [ "${BUILD_MODE}" = "fullstack" ]; then
            MANIFESTS="k8s/deployment-fullstack.yaml k8s/service-fullstack.yaml k8s/ingress.yaml"
          else
            MANIFESTS="k8s/deployment.yaml k8s/service.yaml k8s/ingress.yaml"
          fi
          for f in $MANIFESTS; do
            sed -e "s|__IMAGE__|${IMAGE}|g" \
                -e "s|__SLUG__|${SLUG}|g" \
                -e "s|__HOST__|${HOST}|g" \
                -e "s|__CLUSTER_ISSUER__|${CLUSTER_ISSUER}|g" \
                "$f" > "rendered/$(basename "$f")"
          done
          retry kubectl apply --validate=false -f rendered/
          retry kubectl rollout status "deployment/${SLUG}" -n mvp-lab --timeout=180s

      - name: Update Hostinger DNS
        run: |
          curl -s -o /tmp/dns.json -w "DNS HTTP %{http_code}\n" -X PUT \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://developers.hostinger.com/api/dns/v1/zones/${DOMAIN}" \
            -d "{\"overwrite\":false,\"zone\":[{\"name\":\"${SLUG}\",\"type\":\"A\",\"ttl\":300,\"records\":[{\"content\":\"${MVP_SERVER_IP}\"}]}]}"
          cat /tmp/dns.json || true

      - name: Wait for TLS certificate (auto-heal cert-manager race)
        run: |
          NS=mvp-lab
          CERT="${SLUG}-tls"
          healed=0
          for i in $(seq 1 30); do
            READY=$(kubectl get certificate "$CERT" -n "$NS" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            if [ "$READY" = "True" ]; then
              echo "✅ Certificate $CERT is Ready"
              exit 0
            fi
            ERRORED=$(kubectl get order -n "$NS" --no-headers 2>/dev/null \
              | awk -v c="$CERT" '$1 ~ ("^" c) && $2=="errored"{print $1}')
            if [ -n "$ERRORED" ] && [ "$healed" -eq 0 ]; then
              echo "Detected errored order ($ERRORED) — deleting certificate to force clean retry"
              kubectl delete certificate "$CERT" -n "$NS" --ignore-not-found
              healed=1
            fi
            echo "Waiting for TLS cert... ($i/30) ready=${READY:-pending}"
            sleep 10
          done
          echo "WARNING: $CERT not Ready after ~5min; site serves over HTTP until TLS finishes."

      - name: Notify Discord
        if: success()
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            if [ "${DEPLOY_MODE:-updated}" = "created" ]; then
              MSG="🚀 New MVP **${SLUG}** created and deployed\nhttps://${SLUG}.${DOMAIN}"
            else
              MSG="🔄 MVP **${SLUG}** updated\nhttps://${SLUG}.${DOMAIN}"
            fi
            curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"${MSG}\"}"
          fi
