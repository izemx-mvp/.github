# Auto-add deploy.yml to every new repo in izemx-mvp.
# Lives in: izemx-mvp/.github/.github/workflows/bootstrap-mvp-deploy.yml
#
# Setup (one time):
# 1. Org secret MVP_GH_PAT — classic PAT with repo scope (org owner account)
# 2. Org → Settings → Actions → General → Workflow permissions → Read and write
# 3. This repo → Settings → Actions → General → Access → org repos can use workflows
#
# Backfill an existing repo: Actions → Bootstrap MVP deploy → Run workflow → enter repo name

name: Bootstrap MVP deploy

on:
  repository:
    types: [created]
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo name to bootstrap (e.g. ckb)"
        required: true
        type: string

jobs:
  bootstrap:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.repository.name != '.github'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target repo
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "repo=${{ inputs.repo }}" >> "$GITHUB_OUTPUT"
          else
            echo "repo=${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Add deploy.yml to new MVP repo
        uses: actions/github-script@v7
        env:
          MVP_GH_PAT: ${{ secrets.MVP_GH_PAT }}
        with:
          github-token: ${{ secrets.MVP_GH_PAT }}
          script: |
            const owner = 'izemx-mvp';
            const repo = '${{ steps.target.outputs.repo }}';
            const path = '.github/workflows/deploy.yml';
            const deployYaml = `name: Deploy MVP

            on:
              push:
                branches: [main, develop]

            jobs:
              deploy:
                uses: izemx-mvp/.github/.github/workflows/mvp-deploy.yml@main
                secrets: inherit
            `.replace(/^ {12}/gm, '');

            if (!process.env.MVP_GH_PAT) {
              core.setFailed('MVP_GH_PAT org secret is missing (PAT with repo scope)');
              return;
            }

            const { data: meta } = await github.rest.repos.get({ owner, repo });
            if (meta.name === '.github') {
              core.info('Skipping .github repo');
              return;
            }

            let branch = meta.default_branch || 'main';
            let sha;
            try {
              const { data: existing } = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
              if (!Array.isArray(existing)) {
                core.info(`${path} already exists — skipping`);
                return;
              }
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const message = 'chore: bootstrap MVP deploy workflow';
            const content = Buffer.from(deployYaml).toString('base64');

            async function putFile(targetBranch) {
              let fileSha;
              try {
                const { data: file } = await github.rest.repos.getContent({
                  owner, repo, path, ref: targetBranch,
                });
                if (!Array.isArray(file)) fileSha = file.sha;
              } catch (e) {
                if (e.status !== 404) throw e;
              }
              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, branch: targetBranch, path, message, content,
                ...(fileSha ? { sha: fileSha } : {}),
              });
            }

            try {
              await putFile(branch);
            } catch (e) {
              if (e.status === 404 && branch === 'main') {
                branch = 'develop';
                await putFile(branch);
              } else {
                throw e;
              }
            }

            core.info(`Bootstrapped ${owner}/${repo} on branch ${branch}`);

            // Public repos required for org secrets on free plan
            if (meta.private) {
              try {
                await github.rest.repos.update({ owner, repo, private: false });
                core.info(`Set ${repo} to public (required for org secrets)`);
              } catch (e) {
                core.warning(`Could not set ${repo} public — do it manually in GitHub settings`);
              }
            }
