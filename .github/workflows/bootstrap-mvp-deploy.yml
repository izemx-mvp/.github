# Fully automatic: Lovable links GitHub → this adds deploy.yml + sets Public.
# Safety net: runs every 10 min for any repo that was missed.
#
# ONE-TIME SETUP:
# 1. Push this file to izemx-mvp/.github on main
# 2. Org secret MVP_GH_PAT (fine-grained PAT, Contents+Administration write, all izemx-mvp repos)
# 3. Org secret access: ALL repositories (not only public)
# 4. izemx-mvp → Settings → Actions → Workflow permissions → Read and write

name: Bootstrap MVP deploy

on:
  repository:
    types: [created]
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to fix (optional)"
        required: false
        type: string

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Bootstrap MVP repos (pipeline + public)
        uses: actions/github-script@v7
        env:
          MVP_GH_PAT: ${{ secrets.MVP_GH_PAT }}
        with:
          github-token: ${{ secrets.MVP_GH_PAT }}
          script: |
            const owner = 'izemx-mvp';
            const path = '.github/workflows/deploy.yml';
            const deployYaml = `name: Deploy MVP

            on:
              push:
                branches: [main, develop]

            jobs:
              deploy:
                uses: izemx-mvp/.github/.github/workflows/mvp-deploy.yml@main
                secrets: inherit
            `.replace(/^ {12}/gm, '');

            if (!process.env.MVP_GH_PAT) {
              core.setFailed('MVP_GH_PAT org secret missing');
              return;
            }

            let repos = [];
            if ('${{ github.event_name }}' === 'workflow_dispatch' && '${{ inputs.repo }}') {
              repos = ['${{ inputs.repo }}'];
            } else if ('${{ github.event_name }}' === 'repository') {
              repos = ['${{ github.event.repository.name }}'];
            } else {
              const all = await github.paginate(github.rest.repos.listForOrg, { org: owner, per_page: 100 });
              repos = all.map((r) => r.name).filter((n) => n !== '.github');
              core.info(`Scheduled scan: ${repos.length} repos`);
            }

            async function bootstrapRepo(repo) {
              if (repo === '.github') return;

              const { data: meta } = await github.rest.repos.get({ owner, repo });
              let branch = meta.default_branch || 'main';

              let deployExists = false;
              try {
                const { data: existing } = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                if (!Array.isArray(existing)) deployExists = true;
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              if (!deployExists) {
                const content = Buffer.from(deployYaml).toString('base64');
                const message = 'chore: bootstrap MVP deploy workflow';
                let fileSha;
                try {
                  const { data: file } = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                  if (!Array.isArray(file)) fileSha = file.sha;
                } catch (e) {
                  if (e.status !== 404) throw e;
                }
                try {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo, branch, path, message, content,
                    ...(fileSha ? { sha: fileSha } : {}),
                  });
                  core.info(`✅ ${repo}: added deploy.yml on ${branch}`);
                } catch (e) {
                  if (e.status === 404 && branch === 'main') {
                    branch = 'develop';
                    await github.rest.repos.createOrUpdateFileContents({
                      owner, repo, branch, path, message, content,
                    });
                    core.info(`✅ ${repo}: added deploy.yml on develop`);
                  } else {
                    throw e;
                  }
                }
              } else {
                core.info(`${repo}: deploy.yml already exists`);
              }

              if (meta.private) {
                try {
                  await github.rest.repos.update({ owner, repo, private: false });
                  core.info(`✅ ${repo}: set public`);
                } catch (e) {
                  core.warning(`⚠️ ${repo}: could not set public — add Administration write to MVP_GH_PAT`);
                }
              }
            }

            for (const repo of repos) {
              try {
                await bootstrapRepo(repo);
              } catch (e) {
                core.warning(`⚠️ ${repo}: ${e.message}`);
              }
            }
