name: Bootstrap MVP repo

on:
  repository:
    types: [created]

jobs:
  bootstrap:
    if: github.event.repository.name != '.github'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITLAB_HOST: mc-git.com
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Create GitLab project
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_NAMESPACE_ID: ${{ vars.GITLAB_NAMESPACE_ID }}
        run: |
          HTTP=$(curl -s -o /tmp/gl.json -w "%{http_code}" \
            --request POST \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --data "name=${REPO_NAME}" \
            --data "path=${REPO_NAME}" \
            --data "namespace_id=${GITLAB_NAMESPACE_ID}" \
            --data "visibility=private" \
            "https://${GITLAB_HOST}/api/v4/projects")
          echo "GitLab HTTP ${HTTP}"; cat /tmp/gl.json
          test "$HTTP" = "201" -o "$HTTP" = "409"

      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.payload.repository.owner.login;
            const repo = context.payload.repository.name;
            const gitlabCi = `include:
              - project: izemx/client/mvp/Templates
                ref: develop
                file: .gitlab-ci.yml
            `;
            const syncWorkflow = `name: Sync to GitLab
            on:
              push:
                branches: [develop, main, staging]
            jobs:
              sync:
                runs-on: ubuntu-latest
                steps:
                  - uses: actions/checkout@v4
                    with:
                      fetch-depth: 0
                  - name: Push to GitLab
                    env:
                      GITLAB_TOKEN: \${{ secrets.GITLAB_TOKEN }}
                      GITLAB_PROJECT: izemx/client/mvp/\${{ github.event.repository.name }}
                      BRANCH: \${{ github.ref_name }}
                    run: |
                      git config user.email "github-sync@izemx.com"
                      git config user.name "GitHub Sync"
                      git remote add gitlab "https://oauth2:\${GITLAB_TOKEN}@mc-git.com/\${GITLAB_PROJECT}.git"
                      git push gitlab "HEAD:\${BRANCH}" --force-with-lease
            `;
            for (const [path, content] of [
              ['.gitlab-ci.yml', gitlabCi],
              ['.github/workflows/sync-to-gitlab.yml', syncWorkflow],
            ]) {
              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, branch: 'develop', path,
                  message: 'chore: bootstrap GitLab sync and CI',
                  content: Buffer.from(content).toString('base64'),
                });
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo, branch: 'main', path,
                    message: 'chore: bootstrap GitLab sync and CI',
                    content: Buffer.from(content).toString('base64'),
                  });
                } else throw e;
              }
            }
