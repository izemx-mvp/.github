apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __SLUG__-ingress
  namespace: mvp-lab
  annotations:
    cert-manager.io/cluster-issuer: "__CLUSTER_ISSUER__"
    cert-manager.io/acme-http01-edit-in-place: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - __HOST__
      secretName: __SLUG__-tls
  rules:
    - host: __HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: __SLUG__
                port:
                  number: 80
